<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0A101C">
<title>SCM Deck</title>
<style>
:root{
  --ink:#0A101C; --panel:#111B2E; --panel2:#0D1524; --edge:#22334E; --edge2:#2E4468;
  --txt:#E9EFFA; --mut:#8DA2C2; --dim:#5E7A9E;
  --amber:#F5A524; --teal:#2DD4BF; --violet:#A78BFA; --coral:#FF6B5A;
  --mono:ui-monospace,"Roboto Mono","DejaVu Sans Mono",Menlo,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--ink);color:var(--txt);font-family:var(--sans);overscroll-behavior:none}
body{padding-bottom:calc(66px + var(--safe-b))}
a{color:inherit}
::selection{background:var(--amber);color:#000}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:40;background:rgba(10,16,28,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--edge);padding:calc(var(--safe-t) + 10px) 14px 10px}
.hrow{display:flex;align-items:center;gap:10px;min-height:34px}
.back{background:none;border:none;color:var(--mut);font-size:22px;padding:2px 8px 2px 0;line-height:1;cursor:pointer}
.htitle{font-size:17px;font-weight:700;letter-spacing:-.2px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hkick{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;color:var(--mut);text-transform:uppercase;margin-bottom:2px}
.searchbtn{background:var(--panel);border:1px solid var(--edge);color:var(--mut);border-radius:999px;
  width:34px;height:34px;font-size:15px;cursor:pointer;flex:none}

/* ---------- generic ---------- */
main{padding:14px 14px 28px;max-width:760px;margin:0 auto}
h2.sec{font-size:11px;font-family:var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--mut);
  margin:26px 0 10px;font-weight:600}
h2.sec:first-child{margin-top:6px}
.card{background:var(--panel);border:1px solid var(--edge);border-radius:14px;padding:14px;margin-bottom:10px}
.lead{color:#C6D5EC;font-size:14.5px;line-height:1.55;margin:0 0 12px}
p{line-height:1.55;font-size:14px}
.mut{color:var(--mut)}
.mono{font-family:var(--mono)}
.chip{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 8px;border-radius:6px;border:1px solid var(--edge2);color:var(--mut);background:var(--panel2)}
.t-teal{color:var(--teal);border-color:rgba(45,212,191,.35)}
.t-amber{color:var(--amber);border-color:rgba(245,165,36,.35)}
.t-violet{color:var(--violet);border-color:rgba(167,139,250,.35)}
.t-coral{color:var(--coral);border-color:rgba(255,107,90,.35)}

/* ---------- MD04 ledger signature ---------- */
.ledger{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;margin:0 -14px 4px;scrollbar-width:none}
.ledger::-webkit-scrollbar{display:none}
.lg{flex:none;font-family:var(--mono);font-size:11px;padding:7px 10px;border-radius:8px;
  border:1px solid var(--edge);background:var(--panel2);white-space:nowrap}
.lg b{font-weight:600}
.lg span{color:var(--mut);font-size:9px;display:block;margin-top:2px;letter-spacing:.08em}

/* ---------- home ---------- */
.hero{padding:20px 0 8px}
.hero h1{font-size:30px;line-height:1.05;letter-spacing:-1px;margin:0 0 8px;font-weight:800}
.hero h1 em{font-style:normal;color:var(--amber)}
.hero p{color:var(--mut);font-size:13.5px;margin:0;max-width:44ch}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{background:var(--panel);border:1px solid var(--edge);border-radius:14px;padding:14px;cursor:pointer;
  position:relative;overflow:hidden;text-align:left;color:inherit;font:inherit;transition:transform .12s,border-color .12s}
.tile:active{transform:scale(.98)}
.tile .n{font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:.14em}
.tile h3{margin:8px 0 4px;font-size:15.5px;font-weight:700;letter-spacing:-.2px}
.tile p{margin:0;font-size:12px;color:var(--mut);line-height:1.4}
.tile .bar{position:absolute;left:0;top:0;bottom:0;width:3px}
.wide{grid-column:1/-1}

/* ---------- lists ---------- */
.row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--edge);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;width:100%;text-align:left;color:inherit;font:inherit}
.row:active{border-color:var(--edge2)}
.row .k{font-family:var(--mono);font-size:12.5px;font-weight:600;flex:none;min-width:62px}
.row .d{flex:1;font-size:13.5px;line-height:1.35}
.row .d small{display:block;color:var(--mut);font-size:11.5px;margin-top:2px}
.row .arw{color:var(--mut);font-size:15px}

/* ---------- tables ---------- */
.tw{overflow-x:auto;margin:0 -14px;padding:0 14px;scrollbar-width:thin}
table{border-collapse:collapse;width:100%;min-width:max-content;font-size:12.5px}
th{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);
  text-align:left;padding:8px 12px 8px 0;border-bottom:1px solid var(--edge2);font-weight:600;white-space:nowrap}
td{padding:9px 12px 9px 0;border-bottom:1px solid rgba(34,51,78,.6);vertical-align:top;line-height:1.4;
  max-width:280px}
td:first-child{font-weight:600}
tr:last-child td{border-bottom:none}
.hint{font-family:var(--mono);font-size:9.5px;color:var(--mut);letter-spacing:.1em;margin:6px 0 0}

/* ---------- misc content ---------- */
ul.l{margin:6px 0 0;padding-left:16px}
ul.l li{margin:5px 0;font-size:13.5px;line-height:1.5;color:#C6D5EC}
ul.l li::marker{color:var(--amber)}
.formula{font-family:var(--mono);font-size:15px;background:var(--panel2);border:1px dashed var(--edge2);
  border-radius:10px;padding:14px;text-align:center;margin:10px 0;color:var(--amber);letter-spacing:.02em}
.legend{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:13px;margin-top:8px}
.legend b{font-family:var(--mono);color:var(--teal);font-weight:600}
.blk{border-top:1px solid var(--edge);padding-top:12px;margin-top:12px}
.blk h4{margin:0 0 6px;font-size:13px;letter-spacing:.02em}
.note{background:rgba(245,165,36,.08);border:1px solid rgba(245,165,36,.3);border-radius:10px;
  padding:11px 13px;font-size:13px;line-height:1.5;color:#EBD9B4;margin-top:12px}
.figbtn{display:block;width:100%;padding:0;border:1px solid var(--edge);border-radius:12px;overflow:hidden;
  background:var(--panel2);margin-top:10px;cursor:pointer}
.figbtn img{width:100%;display:block}

/* ---------- library ---------- */
.gal{columns:2;column-gap:10px}
.gcard{break-inside:avoid;margin-bottom:10px;border:1px solid var(--edge);border-radius:12px;overflow:hidden;
  background:var(--panel);cursor:pointer;display:block;width:100%;padding:0;text-align:left;color:inherit;font:inherit}
.gcard img{width:100%;display:block;background:#fff}
.gcard .cap{padding:9px 10px}
.gcard .cap b{font-size:12.5px;display:block;line-height:1.25}
.gcard .cap span{font-size:10.5px;color:var(--mut);display:block;margin-top:3px;line-height:1.3}
.filters{display:flex;gap:6px;overflow-x:auto;padding:2px 14px 12px;margin:0 -14px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fl{flex:none;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
  padding:7px 11px;border-radius:999px;border:1px solid var(--edge);background:var(--panel);color:var(--mut);cursor:pointer}
.fl.on{background:var(--amber);color:#0A101C;border-color:var(--amber);font-weight:700}

/* ---------- viewer ---------- */
.viewer{position:fixed;inset:0;background:#05080F;z-index:100;display:none}
.viewer.on{display:block}
.vtop{position:absolute;top:0;left:0;right:0;z-index:2;padding:calc(var(--safe-t) + 10px) 14px 10px;
  background:linear-gradient(#05080Fdd,transparent);display:flex;gap:10px;align-items:flex-start}
.vtop b{flex:1;font-size:14px;line-height:1.3}
.vtop button{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:999px;font-size:16px;flex:none;cursor:pointer}
.vscroll{position:absolute;inset:0;overflow:auto;display:flex;align-items:center;justify-content:center;padding:0}
.vscroll img{max-width:100%;display:block;transform-origin:center top;transition:transform .18s}
.vscroll.zoom{align-items:flex-start;padding:60px 0}
.vscroll.zoom img{max-width:none;width:230%}
.vhint{position:absolute;bottom:calc(var(--safe-b) + 14px);left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:#8DA2C2;background:rgba(0,0,0,.6);
  padding:6px 12px;border-radius:999px}

/* ---------- search ---------- */
.sheet{position:fixed;inset:0;z-index:90;background:var(--ink);display:none;flex-direction:column}
.sheet.on{display:flex}
.sbar{padding:calc(var(--safe-t) + 10px) 14px 10px;border-bottom:1px solid var(--edge);display:flex;gap:8px}
.sbar input{flex:1;background:var(--panel);border:1px solid var(--edge2);border-radius:10px;color:var(--txt);
  padding:11px 12px;font-size:15px;font-family:var(--sans);outline:none}
.sbar input:focus{border-color:var(--amber)}
.sbar button{background:none;border:none;color:var(--mut);font-size:14px;padding:0 4px;cursor:pointer}
.sres{flex:1;overflow:auto;padding:12px 14px calc(20px + var(--safe-b))}
.empty{text-align:center;color:var(--mut);font-size:13px;padding:40px 20px;line-height:1.6}

/* ---------- tools ---------- */
.field{margin-bottom:10px}
.field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--mut);margin-bottom:5px}
.field input,.field select{width:100%;background:var(--panel2);border:1px solid var(--edge2);border-radius:9px;
  color:var(--txt);padding:11px 12px;font-size:15px;font-family:var(--mono);outline:none}
.field input:focus,.field select:focus{border-color:var(--teal)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.out{background:var(--panel2);border:1px solid var(--edge2);border-radius:12px;padding:14px;margin-top:12px}
.out .big{font-family:var(--mono);font-size:30px;color:var(--teal);font-weight:600;letter-spacing:-1px}
.out .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-bottom:4px}
.outrow{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid rgba(34,51,78,.7);font-size:13px}
.outrow:last-child{border:none}
.outrow b{font-family:var(--mono);color:var(--amber);font-size:15px}
textarea{width:100%;background:var(--panel2);border:1px solid var(--edge2);border-radius:9px;color:var(--txt);
  padding:11px;font-family:var(--mono);font-size:13px;min-height:110px;outline:none;resize:vertical}
textarea:focus{border-color:var(--teal)}
.bar-chart{display:flex;gap:3px;align-items:flex-end;height:80px;margin-top:12px}
.bar-chart i{flex:1;border-radius:2px 2px 0 0;min-height:2px}

/* ---------- tabs ---------- */
nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(10,16,28,.96);backdrop-filter:blur(14px);
  border-top:1px solid var(--edge);display:flex;padding-bottom:var(--safe-b)}
nav button{flex:1;background:none;border:none;color:var(--mut);padding:9px 0 8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;letter-spacing:.1em}
nav button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--amber)}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <button class="back" id="back" style="display:none">‹</button>
    <div style="flex:1;min-width:0">
      <div class="hkick" id="kick">Supply chain · planning · SAP</div>
      <div class="htitle" id="title">SCM Deck</div>
    </div>
    <button class="searchbtn" id="sbtn">⌕</button>
  </div>
</header>

<main id="app"></main>

<nav>
  <button data-tab="home" class="on"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5V21H3z"/></svg>HOME</button>
  <button data-tab="learn"><svg viewBox="0 0 24 24"><path d="M4 5h7v15H4zM13 5h7v15h-7z"/></svg>LEARN</button>
  <button data-tab="library"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="m3 15 5-4 4 3 3-3 6 5"/></svg>SLIDES</button>
  <button data-tab="tools"><svg viewBox="0 0 24 24"><path d="M4 20 20 4M9 4H4v5M15 20h5v-5"/></svg>TOOLS</button>
  <button data-tab="codes"><svg viewBox="0 0 24 24"><path d="m8 8-5 4 5 4M16 8l5 4-5 4M13 5l-2 14"/></svg>CODES</button>
</nav>

<div class="viewer" id="viewer">
  <div class="vtop"><b id="vtitle"></b><button id="vzoom">＋</button><button id="vclose">✕</button></div>
  <div class="vscroll" id="vscroll"><img id="vimg" alt=""></div>
  <div class="vhint" id="vhint">TAP ＋ TO ZOOM · SCROLL TO READ</div>
</div>

<div class="sheet" id="sheet">
  <div class="sbar">
    <input id="sinput" placeholder="Search terms, KPIs, T-codes, tables…" autocomplete="off" autocorrect="off">
    <button id="sclose">Close</button>
  </div>
  <div class="sres" id="sres"></div>
</div>

<script src="data.js"></script>
<script>
/* ============================================================ helpers */
const $ = s => document.querySelector(s);
const app = $('#app');
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const TONES = ['teal','amber','violet','coral'];
const toneOf = i => TONES[i % 4];
const CVAR = {teal:'#2DD4BF', amber:'#F5A524', violet:'#A78BFA', coral:'#FF6B5A'};

let stack = [];           // navigation history of route objects
let tab = 'home';

function table(t){
  if(!t) return '';
  return `<div class="tw"><table><thead><tr>${t.head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
   <tbody>${t.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
   ${t.rows[0].length>2?'<p class="hint">SWIPE TABLE →</p>':''}`;
}
function fig(path, cap){
  return `<button class="figbtn" onclick="viewImage('${path}','${esc(cap||'').replace(/'/g,'')}')">
    <img loading="lazy" src="assets/${path}_t.jpg" alt=""></button>`;
}
function listBlock(b){
  return `<div class="blk"><h4>${esc(b.h)}</h4><ul class="l">${b.l.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;
}

/* ============================================================ router */
function go(route, push=true){
  if(push) stack.push(route);
  render();
  window.scrollTo(0,0);
}
function back(){ stack.pop(); render(); }
function setTab(t){
  tab = t; stack = [{v:t}];
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  render(); window.scrollTo(0,0);
}
function render(){
  const r = stack[stack.length-1] || {v:'home'};
  $('#back').style.display = stack.length>1 ? 'block' : 'none';
  const out = (VIEWS[r.v] || VIEWS.home)(r);
  $('#title').textContent = out.title;
  $('#kick').textContent = out.kick;
  app.innerHTML = out.html;
  if(out.after) out.after();
}
$('#back').onclick = back;
document.querySelectorAll('nav button').forEach(b => b.onclick = () => setTab(b.dataset.tab));

/* ============================================================ image viewer */
let zoomed = false;
function viewImage(path, cap){
  $('#vimg').src = 'assets/' + path + '.jpg';
  $('#vtitle').textContent = cap || '';
  $('#viewer').classList.add('on');
  $('#vscroll').classList.remove('zoom'); zoomed = false; $('#vzoom').textContent = '＋';
  $('#vscroll').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
$('#vclose').onclick = () => { $('#viewer').classList.remove('on'); document.body.style.overflow=''; };
$('#vzoom').onclick = () => {
  zoomed = !zoomed;
  $('#vscroll').classList.toggle('zoom', zoomed);
  $('#vzoom').textContent = zoomed ? '－' : '＋';
  $('#vhint').textContent = zoomed ? 'SCROLL BOTH WAYS TO READ' : 'TAP ＋ TO ZOOM · SCROLL TO READ';
};

/* ============================================================ search */
function buildIndex(){
  const ix = [];
  DATA.glossary.forEach(g => ix.push({t:g[0], s:g[1], tag:'Glossary · '+g[2], go:()=>{closeSearch();setTab('learn');go({v:'glossary',q:g[0]});}}));
  DATA.tcodes.forEach(c => ix.push({t:c[0], s:c[1], tag:'T-code · '+c[2], go:()=>{closeSearch();setTab('codes');$('#tcq') && ($('#tcq').value=c[0], filterCodes());}}));
  DATA.kpiGroups.forEach(g => g.items.forEach(k => ix.push({t:k[0], s:k[1], tag:'KPI · '+g.name, go:()=>{closeSearch();setTab('learn');go({v:'kpi'});}})));
  DATA.fundamentals.forEach(f => ix.push({t:f.title, s:f.lead, tag:'Fundamentals', go:()=>{closeSearch();setTab('learn');go({v:'fund',id:f.id});}}));
  DATA.mrp.sections.forEach(s => ix.push({t:s.view+' — '+s.title, s:s.lead, tag:'MRP', go:()=>{closeSearch();setTab('learn');go({v:'mrpsec',id:s.id});}}));
  DATA.flows.forEach(f => ix.push({t:f.title, s:f.lead, tag:'Process flow', go:()=>{closeSearch();setTab('learn');go({v:'flow',id:f.id});}}));
  DATA.md04.groups.forEach(g => g.rows.forEach(r => ix.push({t:r[0], s:r[1], tag:'MD04 · '+g.n, go:()=>{closeSearch();setTab('learn');go({v:'md04'});}})));
  DATA.masterData.tables.forEach(t => ix.push({t:t[0], s:t[1], tag:'SAP table', go:()=>{closeSearch();setTab('learn');go({v:'master'});}}));
  DATA.library.forEach(l => ix.push({t:l[1], s:l[2], tag:'Slide · '+l[3], go:()=>{closeSearch();viewImage(l[0],l[1]);}}));
  return ix;
}
let INDEX = [];
function openSearch(){ INDEX = INDEX.length?INDEX:buildIndex(); $('#sheet').classList.add('on'); $('#sinput').focus(); doSearch(); }
function closeSearch(){ $('#sheet').classList.remove('on'); $('#sinput').blur(); }
$('#sbtn').onclick = openSearch; $('#sclose').onclick = closeSearch;
$('#sinput').oninput = doSearch;
function doSearch(){
  const q = $('#sinput').value.trim().toLowerCase();
  if(!q){ $('#sres').innerHTML = `<div class="empty">Search 114 glossary terms, 45 KPIs,<br>104 T-codes, every MD04 element,<br>and all 41 slides.</div>`; return; }
  const hits = INDEX.filter(i => (i.t+' '+i.s+' '+i.tag).toLowerCase().includes(q)).slice(0,60);
  if(!hits.length){ $('#sres').innerHTML = `<div class="empty">Nothing matches “${esc(q)}”.<br>Try a shorter word.</div>`; return; }
  $('#sres').innerHTML = hits.map((h,i)=>`<button class="row" data-i="${i}">
    <div class="d"><b style="font-size:14px">${esc(h.t)}</b><small>${esc(h.s)}</small>
    <span class="chip" style="margin-top:6px">${esc(h.tag)}</span></div><div class="arw">›</div></button>`).join('');
  $('#sres').querySelectorAll('.row').forEach(b => b.onclick = () => hits[+b.dataset.i].go());
}

/* ============================================================ views */
const VIEWS = {};

VIEWS.home = () => {
  const led = [['Stock','plant stock','teal'],['SafeSt','safety','teal'],['PldOrd','planned','amber'],
   ['PurRqs','requisition','amber'],['POitem','po item','amber'],['IndReq','forecast','coral'],
   ['CusOrd','sales order','violet'],['DepReq','dependent','coral'],['Delvry','delivery','violet'],
   ['Ord.DS','sto','teal'],['PrcOrd','process','amber']];
  const tiles = [
   ['01','Fundamentals','ABC, XYZ, EOQ, safety stock, turns','teal',()=>go({v:'fundlist'})],
   ['02','KPI hub','45 metrics with the formula that defines them','amber',()=>go({v:'kpi'})],
   ['03','MRP views 1–4','Every field, what it does, what breaks','violet',()=>go({v:'mrp'})],
   ['04','Process flows','MM–PP, MM–SD, MM–EWM, subcontracting','coral',()=>go({v:'flowlist'})],
   ['05','Read MD04','The stock/requirements list, decoded','teal',()=>go({v:'md04'})],
   ['06','Glossary','114 terms, searchable','violet',()=>go({v:'glossary'})]
  ];
  return {title:'SCM Deck', kick:'Supply chain · planning · SAP', html:`
  <div class="hero">
    <h1>The plant runs on<br><em>master data</em>.</h1>
    <p>Everything from your two decks and eighteen boards — planning, sourcing, logistics — offline, in one place.</p>
  </div>
  <div class="ledger">${led.map(l=>`<div class="lg" style="border-color:${CVAR[l[2]]}44">
    <b style="color:${CVAR[l[2]]}">${l[0]}</b><span>${l[1]}</span></div>`).join('')}</div>
  <h2 class="sec">Start here</h2>
  <div class="grid" id="tiles">
    ${tiles.map((t,i)=>`<button class="tile ${i<2?'':''}" data-i="${i}">

 after:()=>{
   const run = () => {
     const D=num('d'), S=num('s'), H=num('h');
     const q = (D>0&&S>0&&H>0) ? Math.sqrt(2*D*S/H) : 0;
     const orders = q>0 ? D/q : 0;
     $('#eo').innerHTML = `<div class="lbl">Economic order quantity</div><div class="big">${fmt(q,0)}</div>

      <div class="outrow"><span>Total annual cost</span><b style="color:var(--teal)">${fmt(orders*S + q/2*H,0)}</b></div></div>`;
   };

 }});

TOOLBODY.ss = () => ({html:`

   <div class="f2">
     ${fld('avgM','Average demand / month',25)}
     ${fld('maxM','Max demand / month',48)}

     ${fld('maxLT','Max lead time (months)',5.44)}

 after:()=>{
   // Acklam's inverse normal CDF
   const norminv = p => {
     if(p<=0||p>=1) return 0;
     const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
     const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
     const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
     const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
     const pl=0.02425; let q,x;
     if(p<pl){ q=Math.sqrt(-2*Math.log(p));
       x=(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1); }
     else if(p<=1-pl){ q=p-0.5; const r=q*q;
       x=(((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1); }
     else { q=Math.sqrt(-2*Math.log(1-p));
       x=-(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1); }
     return x;
   };
   const run = () => {
     const aM=num('avgM'), xM=num('maxM'), aL=num('avgLT'), xL=num('maxLT'),
           sD=num('sdD'), sL=num('sdLT'), sd=num('safeD'), svc=num('svc');
     const Z = norminv(Math.min(Math.max(svc/100,0.001),0.999));
     const aDay = aM/30.4;
     const ss = [
       aDay*sd,
       xL*xM - aL*aM,
       Z*sD*Math.sqrt(aL),
       Z*aM*sL,
       Z*Math.sqrt(aL*sD*sD + Math.pow(aM*sL,2)),
       Z*(sD*Math.sqrt(aL) + aM*sL)
     ];
     const names=['1 · Old school','2 · Average–max','3 · Demand uncertainty ★','4 · Lead time uncertainty','5 · Both, independent ★','6 · Both, dependent'];
     const max = Math.max(...ss.map(Math.abs));
     $('#so').innerHTML = `<div class="lbl">Service coefficient Z</div><div class="big">${fmt(Z,2)}</div>
      <div style="margin-top:14px">
      ${ss.map((v,i)=>`<div class="outrow"><span style="font-size:12.5px">${names[i]}<br>
        <small class="mut" style="font-size:11px">ROP ${fmt(v + aM*aL,0)}</small></span>
        <b style="color:${i===2||i===4?'var(--teal)':'var(--amber)'}">${fmt(v,0)}</b></div>`).join('')}</div>
      <div class="bar-chart">${ss.map((v,i)=>`<i style="height:${max?Math.max(2,Math.abs(v)/max*100):2}%;background:${i===2||i===4?'#2DD4BF':'#F5A524'}"></i>`).join('')}</div>
      <p class="hint">★ = RECOMMENDED IN THE DECK · BARS COMPARE THE SIX SAFETY STOCKS</p>`;
   };
   ['avgM','maxM','avgLT','maxLT','sdD','sdLT','safeD','svc'].forEach(i=>$('#'+i).oninput=run); run();
 }});

TOOLBODY.abc = () => ({html:`

   <textarea id="ab">Bearing 6204, 480000
Motor 3kW, 310000
Gearbox HD, 220000
Seal kit, 96000
Coupling, 74000
V-belt B96, 41000
Grease EP2, 28000
Bolt M12, 12000
Washer M12, 6000
Cable tie, 2400</textarea>
   <div class="out" id="ao"></div></div>`,
 after:()=>{
   const run = () => {
     const items = $('#ab').value.split('\n').map(l=>{
       const p = l.split(','); const v = parseFloat((p[1]||'').replace(/[^0-9.\-]/g,''));
       return p[0] && isFinite(v) ? {n:p[0].trim(), v} : null;
     }).filter(Boolean).sort((a,b)=>b.v-a.v);
     const tot = items.reduce((s,i)=>s+i.v,0);
     let cum = 0; const cls = {A:0,B:0,C:0};
     const rows = items.map(i=>{
       cum += i.v; const p = tot?cum/tot*100:0;
       const c = p<=70 ? 'A' : p<=90 ? 'B' : 'C'; cls[c]++;
       return {...i, p, c};
     });
     const col = {A:'#FF6B5A',B:'#F5A524',C:'#2DD4BF'};
     $('#ao').innerHTML = `<div class="lbl">Total value</div><div class="big">${fmt(tot,0)}</div>
      <div style="display:flex;gap:8px;margin:12px 0">
       ${['A','B','C'].map(c=>`<div style="flex:1;background:var(--panel);border:1px solid ${col[c]}55;border-radius:9px;padding:9px;text-align:center">
        <div class="mono" style="color:${col[c]};font-size:20px;font-weight:600">${cls[c]}</div>
        <div class="mono" style="font-size:9px;letter-spacing:.14em;color:var(--mut)">CLASS ${c}</div>
        <div style="font-size:10px;color:var(--mut);margin-top:2px">${items.length?fmt(cls[c]/items.length*100,0):0}% of items</div></div>`).join('')}

      ${rows.map(r=>`<div class="outrow"><span style="font-size:12.5px">
        <b class="mono" style="color:${col[r.c]};font-size:12px">${r.c}</b> &nbsp;${esc(r.n)}
        <br><small class="mut" style="font-size:11px">cumulative ${fmt(r.p,1)}%</small></span>
        <b style="color:var(--mut)">${fmt(r.v,0)}</b></div>`).join('')}`;
   };
   $('#ab').oninput = run; run();
 }});

TOOLBODY.xyz = () => ({html:`
  <div class="card"><p class="lead">Paste a demand series — one period per line, or comma separated. Cut-offs: X ≤ 0.5, Y ≤ 1.0, Z above.</p>
   <div class="formula">CoV = σ demand ÷ mean demand</div>
   <textarea id="xz">7, 11, 47, 10, 48, 46, 41, 31, 15, 22, 8, 14</textarea>
   <div class="out" id="xo"></div></div>`,
 after:()=>{
   const run = () => {
     const v = $('#xz').value.split(/[\s,;]+/).map(parseFloat).filter(x=>isFinite(x));
     if(v.length<2){ $('#xo').innerHTML = `<div class="empty">Add at least two periods.</div>`; return; }
     const mean = v.reduce((a,b)=>a+b,0)/v.length;
     const sd = Math.sqrt(v.reduce((s,x)=>s+Math.pow(x-mean,2),0)/(v.length-1));
     const cov = mean ? sd/mean : 0;
     const c = cov<=0.5?'X':cov<=1?'Y':'Z';
     const col = {X:'#2DD4BF',Y:'#F5A524',Z:'#FF6B5A'}[c];
     const max = Math.max(...v);
     $('#xo').innerHTML = `<div class="lbl">Coefficient of variation</div>
      <div class="big" style="color:${col}">${fmt(cov,3)} <span style="font-size:16px">→ class ${c}</span></div>
      <div class="bar-chart">${v.map(x=>`<i style="height:${max?x/max*100:0}%;background:${col}"></i>`).join('')}</div>
      <div style="margin-top:12px">
      <div class="outrow"><span>Periods</span><b>${v.length}</b></div>
      <div class="outrow"><span>Total</span><b>${fmt(v.reduce((a,b)=>a+b,0),0)}</b></div>
      <div class="outrow"><span>Mean demand</span><b>${fmt(mean,2)}</b></div>
      <div class="outrow"><span>Standard deviation</span><b>${fmt(sd,2)}</b></div>
      <div class="outrow"><span>Max</span><b>${fmt(max,0)}</b></div></div>
      <p class="hint">FEED σ INTO SAFETY STOCK METHODS 3 AND 5</p>`;
   };
   $('#xz').oninput = run; run();
 }});

TOOLBODY.fa = () => ({html:`
  <div class="card"><p class="lead">One period per line: <span class="mono">actual, forecast</span>. WMAPE weights by volume — the level where decisions get made.</p>
   <div class="formula">WMAPE = Σ|A − F| ÷ ΣA &nbsp;·&nbsp; Bias = Σ(A − F) ÷ ΣF</div>
   <textarea id="fa">7, 10
11, 12
47, 30
10, 15
48, 35
46, 40
41, 38
31, 35
15, 20
22, 18
8, 12
14, 15</textarea>
   <div class="out" id="fo"></div></div>`,
 after:()=>{
   const run = () => {
     const rows = $('#fa').value.split('\n').map(l=>{
       const p = l.split(/[,;\t]/).map(x=>parseFloat(x));
       return isFinite(p[0]) && isFinite(p[1]) ? p : null;
     }).filter(Boolean);
     if(!rows.length){ $('#fo').innerHTML = `<div class="empty">Add at least one actual and forecast pair.</div>`; return; }
     const sa = rows.reduce((s,r)=>s+r[0],0), sf = rows.reduce((s,r)=>s+r[1],0);
     const sae = rows.reduce((s,r)=>s+Math.abs(r[0]-r[1]),0);
     const wmape = sa ? sae/sa : 0, acc = (1-wmape)*100;
     const bias = sf ? (sa-sf)/sf*100 : 0;
     const mape = rows.filter(r=>r[0]!==0).reduce((s,r)=>s+Math.abs(r[0]-r[1])/r[0],0) / (rows.filter(r=>r[0]!==0).length||1) * 100;
     const bc = Math.abs(bias)<5 ? '#2DD4BF' : Math.abs(bias)<15 ? '#F5A524' : '#FF6B5A';
     const max = Math.max(...rows.flat());
     $('#fo').innerHTML = `<div class="lbl">Forecast accuracy (1 − WMAPE)</div>
      <div class="big" style="color:${acc>80?'#2DD4BF':acc>60?'#F5A524':'#FF6B5A'}">${fmt(acc,1)}%</div>
      <div class="bar-chart" style="height:64px">${rows.map(r=>`<i style="height:${max?r[0]/max*100:0}%;background:#2DD4BF"></i>
        <i style="height:${max?r[1]/max*100:0}%;background:#A78BFA;margin-right:4px"></i>`).join('')}</div>
      <p class="hint">TEAL = ACTUAL · VIOLET = FORECAST</p>
      <div style="margin-top:12px">
      <div class="outrow"><span>WMAPE</span><b>${fmt(wmape*100,1)}%</b></div>
      <div class="outrow"><span>Bias — ${bias>0?'under-forecasting':bias<0?'over-forecasting':'neutral'}</span><b style="color:${bc}">${bias>0?'+':''}${fmt(bias,1)}%</b></div>
      <div class="outrow"><span>MAPE (unweighted)</span><b>${fmt(mape,1)}%</b></div>
      <div class="outrow"><span>Total actual / forecast</span><b>${fmt(sa,0)} / ${fmt(sf,0)}</b></div></div>
      <p class="hint">BIAS IS WORSE THAN ERROR — IT COMPOUNDS INTO STOCK OR STOCKOUT</p>`;
   };
   $('#fa').oninput = run; run();
 }});
